#config-version=FG200F-7.2.8-FW-build1639-231212:opmode=1:vdom=0
#conf_file_ver=13500070
#buildno=1639
#global_vdom=1
config system global
    set admin-concurrent enable
    set admin-console-timeout 5
    set admin-https-redirect enable
    set admin-https-ssl-versions tlsv1-2 tlsv1-3
    set admin-lockout-duration 60
    set admin-lockout-threshold 3
    set admin-port 8080
    set admin-sport 8443
    set admin-ssh-port 2222
    set admin-ssh-v1 disable
    set admintimeout 10
    set gui-cdn enable
    set hostname "FG-CIS-TEST"
    set intra-zone-deny enable
    set pre-login-banner enable
    set post-login-banner enable
    set strong-crypto enable
    set timezone 5
    set usb-auto-install disable
end
config system dns
    set primary 8.8.8.8
    set secondary 8.8.4.4
end
config system ntp
    set ntpsync enable
    set type fortiguard
end
config system password-policy
    set status enable
    set min-length 12
    set min-upper-case-letter 1
    set min-lower-case-letter 1
    set min-number 1
    set min-non-alphanumeric 1
end
config system ha
    set mode a-p
    set group-name "fg-ha-cluster"
    set ha-mgmt-status enable
    set password ENC_SECRET
    set monitor port1 port2
    config ha-mgmt-interfaces
        edit 1
            set interface port3
            set gateway 10.0.0.1
        next
    end
end
config system admin
    edit "admin"
        set accprofile "super_admin"
        set password ENC_SECRET
        set trusthost1 10.0.0.0/24
    next
    edit "readonly"
        set accprofile "read_only"
        set password ENC_SECRET
        set trusthost1 10.0.0.0/24
    next
end
config system snmp sysinfo
    set status enable
end
config system interface
    edit "port1"
        set vdom "root"
        set ip 192.168.1.1 255.255.255.0
        set allowaccess ping https ssh
        set role wan
    next
    edit "port2"
        set vdom "root"
        set ip 10.10.10.1 255.255.255.0
        set allowaccess ping https ssh snmp
        set role lan
    next
    edit "port3"
        set vdom "root"
        set ip 10.0.0.100 255.255.255.0
        set allowaccess ping https ssh
        set role dmz
    next
end
config firewall policy
    edit 1
        set name "LAN-to-WAN"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS" "DNS"
        set logtraffic all
        set ips-sensor "default"
        set av-profile "default"
        set application-list "default"
    next
    edit 2
        set name "DMZ-to-WAN"
        set srcintf "port3"
        set dstintf "port1"
        set srcaddr "DMZ_Servers"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTPS" "DNS"
        set logtraffic all
    next
end
config firewall local-in-policy
    edit 1
        set intf "port2"
        set srcaddr "Admin_Hosts"
        set dstaddr "all"
        set action accept
        set service "HTTPS" "SSH"
        set schedule "always"
    next
end
config ips sensor
    edit "default"
        config entries
            edit 1
                set status enable
            next
        end
    next
end
config antivirus profile
    edit "default"
        set outbreak-prevention enable
        config content-disarm
            set machine-learning-detection enable
        end
    next
end
config antivirus settings
    set grayware enable
    set default-db extended
end
config dnsfilter profile
    edit "default"
        set block-botnet enable
        set log-all-domain enable
    next
end
config application list
    edit "default"
        set other-application-log enable
        config entries
            edit 1
                set action block
                set category 2
            next
        end
    next
end
config webfilter profile
    edit "default"
        set web-content-log enable
        config ftgd-wf
            config filters
                edit 1
                    set category 26
                    set action block
                next
            end
        end
    next
end
config firewall ssl-ssh-profile
    edit "deep-inspection"
        config ssl
            set inspect-all enable
        end
    next
end
config vpn ssl settings
    set servercert "custom-cert"
    set ssl-min-proto-ver tls1-2
end
config vpn ipsec phase1-interface
    edit "vpn-to-branch"
        set proposal aes256-sha256
        set dhgrp 14 19 20 21
    next
end
config vpn certificate ca
    edit "DigiCert"
    next
end
config system csf
    set status enable
    set group-name "fabgroup"
end
config log disk setting
    set status enable
    set diskfull overwrite
end
config log eventfilter
    set event enable
end
config log fortianalyzer setting
    set status enable
    set server "10.10.10.200"
    set enc-algorithm high
end
config log syslogd setting
    set status enable
    set server "10.10.10.201"
end
config emailfilter profile
    edit "default"
    next
end
config file-filter profile
    edit "default"
    next
end
config system interface
    edit "port1"
        set scan-botnet-connections block
    next
end
